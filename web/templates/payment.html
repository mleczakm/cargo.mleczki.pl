{{define "payment-content"}}
{{if eq .PaymentMethod "cash_pickup"}}
{{template "payment-cash-pickup" .}}
{{else if eq .PaymentMethod "blik_pickup"}}
{{template "payment-cash-pickup" .}}
{{else}}
<div class="max-w-2xl mx-auto px-4 py-16">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden text-center">
        <div class="bg-gray-900 text-white p-8">
            <svg class="w-16 h-16 mx-auto mb-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
            </svg>
            <h2 class="text-3xl font-black mb-2">Płatność BLIK na telefon</h2>
        </div>
        <div class="p-8">
            {{template "payment-blik" .}}
        </div>
    </div>
</div>
{{end}}
{{end}}
