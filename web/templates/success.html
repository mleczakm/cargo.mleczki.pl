{{define "success-content"}}
<div class="max-w-2xl mx-auto px-4 py-20 text-center">
    <div class="bg-emerald-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-12 h-12 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </div>
    <h2 class="text-4xl font-black text-gray-900 mb-4">Zrobione! Do zobaczenia.</h2>
    <p class="text-lg text-gray-600 mb-8">
        Szczegóły wysłaliśmy na e-mail: <strong>{{.Email}}</strong>. Pamiętaj o zabraniu dokumentu tożsamości przy odbiorze.
    </p>
    <a href="/user" class="bg-gray-900 hover:bg-gray-800 text-white px-8 py-3 rounded-xl font-semibold transition-colors inline-block">
        Przejdź do Twojego panelu
    </a>
</div>
{{end}}
