{{define "forgot_password-content"}}
<div class="relative p-8">
    <button type="button" onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
    <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
    </div>
    <h2 class="text-2xl font-black text-gray-900 mb-2">Przypomnij hasło</h2>
    <p class="text-gray-500 text-sm mb-6">Wprowadź swój adres e-mail, a wyślemy Ci link do resetowania hasła.</p>

    {{if .EmailSent}}
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6">
        <p class="font-medium mb-1">E-mail wysłany</p>
        <p class="text-sm">Jeśli konto z tym adresem e-mail istnieje, wysłaliśmy Ci link do resetowania hasła.</p>
    </div>
    {{else}}
    <form hx-post="/forgot-password" hx-target="#modal-content">
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Adres e-mail</label>
                <input type="email" name="email" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="jan@example.com" required />
            </div>
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md">
            Wyślij link do resetowania
        </button>
    </form>
    {{end}}

    <div class="text-center mt-6">
        <button type="button" hx-get="/login?modal=1" hx-target="#modal-content" class="text-sm text-emerald-600 hover:text-emerald-500 font-medium transition-colors">
            Wróć do logowania
        </button>
    </div>
</div>
{{end}}
