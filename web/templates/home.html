<section class="py-16 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {{range .Products}}
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-shadow duration-300 flex flex-col cursor-pointer" onclick="window.location='/product/{{.ID}}'">
            <div class="h-56 overflow-hidden relative group">
                <img src="{{.Image}}" alt="{{.Name}}" class="w-full h-full object-contain object-bottom group-hover:scale-105 transition-transform duration-500" />
                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full flex items-center space-x-2 shadow-sm">
                    <span class="font-bold text-gray-900">{{.BasePrice}} zł / dobę</span>
                </div>
            </div>
            <div class="p-6 flex-grow flex flex-col">
                <h3 class="text-xl font-bold text-gray-900 mb-2">{{.Name}}</h3>
                <p class="text-gray-600 text-sm mb-6 flex-grow line-clamp-2">{{.Description | stripHTML}}</p>
                <button class="w-full bg-gray-100 hover:bg-emerald-600 hover:text-white text-gray-900 font-medium py-3 px-4 rounded-xl transition-colors duration-300 flex items-center justify-center space-x-2">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                    <span>Sprawdź dostępność i rezerwuj</span>
                </button>
            </div>
        </div>
        {{end}}
    </div>
</section>
{{end}}
