{{define "reset_password-content"}}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-gray-900 mb-2">{{.Title}}</h2>
        <p class="text-gray-500 text-sm">Wprowadź nowe hasło dla swojego konta.</p>
    </div>

    {{if .ErrorMessage}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-6">
        {{.ErrorMessage}}
    </div>
    {{end}}

    {{if .Success}}
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6">
        <p class="font-medium mb-1">Hasło zmienione</p>
        <p class="text-sm">Twoje hasło zostało pomyślnie zmienione. Możesz się teraz zalogować.</p>
    </div>
    <div class="text-center">
        <a href="/login" hx-get="/login?modal=1" hx-target="#modal-content" hx-trigger="click" onclick="document.getElementById('modal-container').classList.remove('hidden')" class="text-sm text-emerald-600 hover:text-emerald-500 font-medium transition-colors">
            Przejdź do logowania
        </a>
    </div>
    {{else}}
    <form action="/reset-password" method="POST" class="space-y-4">
        <input type="hidden" name="token" value="{{.Token}}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nowe hasło</label>
            <input type="password" name="new_password" minlength="8" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Min. 8 znaków" required />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Potwierdź hasło</label>
            <input type="password" name="confirm_password" minlength="8" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Powtórz hasło" required />
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md">
            Zmień hasło
        </button>
    </form>
    {{end}}
</div>
{{end}}
