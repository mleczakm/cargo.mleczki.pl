{{define "login.html"}}
{{template "layout.html" .}}
{{end}}

{{define "scripts"}}
<script>
    // Only auto-open modal if we're on the login page
    if (window.location.pathname === '/login') {
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('modal-container').classList.remove('hidden');
        });
    }

    function closeModal() {
        document.getElementById('modal-container').classList.add('hidden');
        window.location.href = '/';
    }
</script>
{{end}}

{{define "login-content"}}
<div class="p-8">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
    <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
    </div>
    <h2 class="text-2xl font-black text-gray-900 mb-2">Zaloguj się</h2>
    <p class="text-gray-500 text-sm mb-6">Wpisz swoje dane, aby uzyskać dostęp do historii rezerwacji i szybciej zamawiać bez wpisywania danych.</p>

    {{if .ErrorMessage}}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-6">
        {{.ErrorMessage}}
    </div>
    {{end}}

    <form hx-post="/login" hx-target="#modal-content">
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Adres e-mail</label>
                <input type="email" name="email" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="jan@example.com" required />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Hasło</label>
                <input type="password" name="password" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="••••••••" required />
            </div>
        </div>
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md">
            Zaloguj się
        </button>
    </form>
</div>
{{end}}
