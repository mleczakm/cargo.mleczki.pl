---
- name: "Log in to GHCR"
  command: "docker login ghcr.io -u {{ github_actor }} --password-stdin"
  args:
    stdin: "{{ github_token }}"

- name: "Pull Docker image: {{ app.image }}"
  command: "docker pull {{ app.image }}"

- name: "Stop existing container: {{ app.name }}"
  command: "docker stop {{ app.name }}"
  ignore_errors: yes

- name: "Remove existing container: {{ app.name }}"
  command: "docker rm {{ app.name }}"
  ignore_errors: yes

- name: "Read .env.production file"
  slurp:
    src: "{{ env_file_path }}"
  register: env_file_content
  delegate_to: localhost

- name: "Parse env file into dictionary"
  set_fact:
    app_env_vars: >-
      {{
        (env_file_content.content | b64decode | regex_replace('\r', '')).split('\n')
        | select('match', '^[A-Z]')
        | map('regex_replace', '([^=]+)=(.*)', '\1=\2')
        | map('split', '=', 1)
        | items2dict(key_name=0, value_name=1)
      }}

- name: "Create temporary .env file on remote"
  copy:
    content: |
      {% for key, value in (app_env_vars | default({})).items() %}
      {{ key }}={{ value }}
      {% endfor %}
      {% for key, value in (app.env | default({})).items() %}
      {{ key }}={{ value }}
      {% endfor %}
    dest: "/tmp/{{ app.name }}.env"
    mode: '0600'

- name: "Run new container: {{ app.name }}"
  command: >
    docker run -d
    --name {{ app.name }}
    --restart always
    -p "[{{ app.ipv6 }}]:{{ app.port }}:8080"
    --env-file "/tmp/{{ app.name }}.env"
    {{ app.image }}

- name: "Remove temporary .env file"
  file:
    path: "/tmp/{{ app.name }}.env"
    state: absent

- name: "Wait for container to be ready"
  wait_for:
    timeout: 30

- name: "Verify Cytrus Domain for {{ app.domain }}"
  uri:
    url: "https://api.mikr.us/domain"
    method: POST
    body_format: form-urlencoded
    body:
      srv: "{{ ansible_host | regex_replace('\\..*', '') }}"
      key: "{{ cytrus_api_token }}"
    status_code: 200
  register: cytrus_domains
  delegate_to: localhost
  when: app.proxied | default(false)


- name: "Check if {{ app.domain }} is in Cytrus domains"
  assert:
    that:
      - app.domain in (cytrus_domains.json | map(attribute='name') | list)
    fail_msg: "Domain {{ app.domain }} is not configured in Cytrus. Available domains: {{ cytrus_domains.json | map(attribute='name') | list }}"
  when: app.proxied | default(false)

- name: "Update Cloudflare DNS for {{ app.domain }}"
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"
  register: cf_records
  delegate_to: localhost
  when: cloudflare_api_token is defined and cloudflare_zone_id is defined

- name: "Find record ID for {{ app.domain }}"
  set_fact:
    cf_record_id: "{{ (cf_records.json.result | selectattr('name', 'equalto', app.domain) | first).id }}"
  when: cloudflare_api_token is defined and cf_records.json.result | selectattr('name', 'equalto', app.domain) | list | length > 0

- name: "Update Cloudflare A record"
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ cf_record_id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: "application/json"

    body_format: json
    body:
      type: "A"
      name: "{{ app.domain }}"
      content: "135.181.95.85" # Cytrus IPv4
      ttl: 1
      proxied: true
  delegate_to: localhost
  when: cf_record_id is defined
