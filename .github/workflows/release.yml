name: Release

on:
  workflow_run:
    workflows: ["CI/CD with QA"]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract production metadata
        id: meta-prod
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long

      - name: Generate version
        id: version
        run: |
          export TZ="Europe/Warsaw"
          echo "APP_VERSION=$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create-release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.APP_VERSION }}
          name: "Release ${{ steps.version.outputs.APP_VERSION }}"
          body: "Automated release generated by CI"
          draft: false
          prerelease: false
          token: ${{ secrets.PAT_TOKEN }}
